name: Build and Release
on:
  push:
    tags:
      - 'v*' # Triggered when you push a tag like v1.0.0

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  release-contract:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      # Optional: specify if your contract is in a subfolder
      # relative_path: ./circuits/move_validator